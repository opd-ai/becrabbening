# cbindgen configuration for the nsfoo example.
# See 03-PHASE-2-C-FFI.md for a full explanation of each field.

# Generate a C header (not C++).
language = "C"

# Comment placed at the very top of the generated header.
header = "/* This file is generated by cbindgen. Do not edit by hand.\n * Regenerate with: cbindgen --config cbindgen.toml --crate nsfoo --output nsfoo_ffi.h\n */"

# C include guard macro name.
include_guard = "fox_nsfoo_ffi_h"

# Warning comment placed after the header comment.
autogen_warning = "/* Warning: This file is autogenerated by cbindgen. Do not edit manually. */"

[export]
# Prefix prepended to all exported type names (e.g. NsFoo → FoxNsFoo).
prefix = "Fox"
